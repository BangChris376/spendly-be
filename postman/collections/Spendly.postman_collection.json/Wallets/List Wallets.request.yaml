$kind: http-request
description: "Returns { wallets: [...], recent_activity: [...] }. Each wallet includes transaction_count, total_income, total_expense, and recent_activity (last 5 transactions). recent_activity at root level is the 20 most recent transactions across all wallets."
url: "{{base_url}}/wallets"
method: GET
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const list = pm.response.json().data.wallets || [];
        if (list.length && !pm.collectionVariables.get('wallet_id')) {
          pm.collectionVariables.set('wallet_id', list[0].id);
        }
      }
    language: text/javascript
order: 1000
