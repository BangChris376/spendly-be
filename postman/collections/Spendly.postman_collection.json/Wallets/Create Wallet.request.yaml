$kind: http-request
description: "Creates a new wallet. type: bank | credit_card | e_wallet | cash. balance defaults to 0."
url: "{{base_url}}/wallets"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "BCA Savings",
      "type": "bank",
      "account_number": "****1234",
      "bank_name": "Bank BCA",
      "balance": 5000000,
      "color": "#1B4D35"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        pm.collectionVariables.set('wallet_id', pm.response.json().data.id);
      }
    language: text/javascript
order: 4000
