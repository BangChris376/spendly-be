$kind: http-request
description: All fields are optional. Setting is_default=true will unset the previous default wallet. balance can be set directly.
url: "{{base_url}}/wallets/{{wallet_id}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "BCA Primary",
      "account_number": "****1234",
      "bank_name": "Bank BCA",
      "color": "#1B4D35",
      "balance": 12850000,
      "is_default": true
    }
order: 6000
