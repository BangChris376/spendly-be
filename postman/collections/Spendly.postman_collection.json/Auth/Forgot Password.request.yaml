$kind: http-request
description: Sends a password reset link. In development (NODE_ENV=development), the reset_token is returned in the response and auto-saved to collection variables.
url: "{{base_url}}/auth/forgot-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "alex.graham@spendly.io"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const data = pm.response.json().data;
        if (data && data.reset_token) pm.collectionVariables.set('reset_token', data.reset_token);
      }
    language: text/javascript
order: 5000
