$kind: http-request
description: Updates first_name, last_name, monthly_limit. Optionally accepts an avatar file. Send as multipart/form-data.
url: "{{base_url}}/auth/me"
method: PUT
body:
  type: formdata
  content:
    - type: text
      key: first_name
      value: Alex
    - type: text
      key: last_name
      value: Graham
    - type: text
      key: monthly_limit
      value: "25000000"
    - type: file
      key: avatar
      src: ""
      description: Optional. JPG/PNG, max 5MB
      disabled: true
order: 8000
