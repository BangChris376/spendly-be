$kind: http-request
description: Changes password. Requires current password. All existing refresh tokens are revoked — user must login again.
url: "{{base_url}}/auth/me/password"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "current_password": "password123",
      "new_password": "newpassword456"
    }
order: 10000
