$kind: http-request
description: Resets the password using the token from Forgot Password. Token expires in 1 hour. All existing refresh tokens are revoked.
url: "{{base_url}}/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "token": "{{reset_token}}",
      "new_password": "newpassword123"
    }
auth:
  type: noauth
order: 6000
