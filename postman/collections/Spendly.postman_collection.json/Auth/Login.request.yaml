$kind: http-request
description: Authenticates user and returns accessToken + refreshToken. Token is auto-saved to collection variables.
url: "{{base_url}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "alex.graham@spendly.io",
      "password": "password123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const data = pm.response.json().data;
        pm.collectionVariables.set('token', data.accessToken);
        pm.collectionVariables.set('refresh_token', data.refreshToken);
      }
    language: text/javascript
order: 2000
