$kind: http-request
description: Rotates the refresh token and issues a new access token. Old refresh token is invalidated.
url: "{{base_url}}/auth/refresh"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "refresh_token": "{{refresh_token}}"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const data = pm.response.json().data;
        pm.collectionVariables.set('token', data.accessToken);
        pm.collectionVariables.set('refresh_token', data.refreshToken);
      }
    language: text/javascript
order: 3000
