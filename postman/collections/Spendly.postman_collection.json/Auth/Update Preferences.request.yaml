$kind: http-request
description: Updates user notification and display preferences. All fields are optional — only provided fields are updated.
url: "{{base_url}}/auth/me/preferences"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "push_notifications": true,
      "email_summaries": false,
      "security_alerts": true,
      "spending_alerts": true,
      "spending_alert_pct": 80,
      "dark_mode": false,
      "currency": "IDR"
    }
order: 11000
