$kind: collection
name: Spendly API
description: |-
  REST API for Spendly Financial Tracker. Base URL: http://localhost:3000/api/v1

  Quick start:
  1. Edit the `base_url` collection variable if your server runs elsewhere.
  2. Run Auth > Login. The access token and refresh token are saved automatically.
  3. Run Wallets > List Wallets and Categories > List Categories to populate `wallet_id` and `category_id` variables.
  4. All other requests will work from there.
variables:
  base_url: http://localhost:3000/api/v1
  token: ""
  refresh_token: ""
  reset_token: ""
  transaction_id: ""
  wallet_id: ""
  category_id: ""
  budget_id: ""
  scan_id: ""
auth:
  - id: 97f36739-0efc-4e61-9f32-ca50d929216c
    type: bearer
    name: bearer auth
    credentials:
      token: "{{token}}"
