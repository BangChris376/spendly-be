$kind: http-request
description: "Downloads a UTF-8 CSV file (with BOM for Excel compatibility). Columns: ID, Date, Type, Amount, Category, Wallet, Merchant, Notes. Transfer transactions show 'Transfer' in the Category column. Use responseType: 'blob' in axios or .blob() in fetch on the frontend."
url: "{{base_url}}/transactions/export-csv"
method: GET
queryParams:
  - key: type
    value: expense
    disabled: true
    description: income | expense | transfer
  - key: wallet_id
    value: "{{wallet_id}}"
    disabled: true
  - key: category_id
    value: "{{category_id}}"
    disabled: true
  - key: date_from
    value: 2026-01-01
    disabled: true
  - key: date_to
    value: 2026-12-31
    disabled: true
order: 11000
