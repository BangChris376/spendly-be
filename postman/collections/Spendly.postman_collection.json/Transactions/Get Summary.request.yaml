$kind: http-request
description: Returns total_income, total_expense, net_balance, transaction_count, and top-6 expense breakdown by category for the given period.
url: "{{base_url}}/transactions/summary?period=month&year=2026&month=5"
method: GET
queryParams:
  - key: period
    value: month
    description: month | year
  - key: year
    value: "2026"
  - key: month
    value: "5"
    description: 1-12, only used when period=month
order: 8000
