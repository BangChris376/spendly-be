$kind: http-request
description: "Paginated transaction list. Sorted by date DESC then created_at DESC by default. Returns { data: [...], pagination: { total, page, limit, totalPages } }."
url: "{{base_url}}/transactions?page=1&limit=10&sort=date&order=DESC"
method: GET
queryParams:
  - key: page
    value: "1"
    description: "Page number (default: 1)"
  - key: limit
    value: "10"
    description: "Items per page (default: 10)"
  - key: sort
    value: date
    description: date | amount | created_at
  - key: order
    value: DESC
    description: ASC | DESC
  - key: type
    value: expense
    disabled: true
    description: income | expense | transfer
  - key: date_from
    value: 2026-05-01
    disabled: true
  - key: date_to
    value: 2026-05-31
    disabled: true
  - key: category_id
    value: "{{category_id}}"
    disabled: true
  - key: wallet_id
    value: "{{wallet_id}}"
    disabled: true
  - key: search
    value: Indomaret
    disabled: true
    description: Search by merchant_name or description
  - key: amount_min
    value: "50000"
    disabled: true
  - key: amount_max
    value: "500000"
    disabled: true
order: 1000
