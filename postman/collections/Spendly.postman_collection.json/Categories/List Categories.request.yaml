$kind: http-request
description: Returns all system categories plus user-created categories. Each entry includes transaction_count and total_amount. Icons are Lucide React component names (e.g. 'ShoppingCart', 'Sparkles', 'Fuel').
url: "{{base_url}}/categories"
method: GET
queryParams:
  - key: type
    value: expense
    disabled: true
    description: expense | income | both — filters by type (also returns 'both' categories)
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
        const list = pm.response.json().data || [];
        if (list.length && !pm.collectionVariables.get('category_id')) {
          pm.collectionVariables.set('category_id', list[0].id);
        }
      }
    language: text/javascript
order: 1000
