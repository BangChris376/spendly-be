$kind: http-request
description: Updates a user-created category. System categories (is_system=true) cannot be edited.
url: "{{base_url}}/categories/{{category_id}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Hobbies & Games",
      "icon": "Gamepad2",
      "color": "#7C3AED"
    }
order: 5000
