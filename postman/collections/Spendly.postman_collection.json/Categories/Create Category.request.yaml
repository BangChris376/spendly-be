$kind: http-request
description: "Creates a user-defined category. icon should be a valid Lucide React component name (PascalCase). type: expense | income | both."
url: "{{base_url}}/categories"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Hobbies",
      "icon": "Gamepad2",
      "color": "#8B5CF6",
      "type": "expense"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        pm.collectionVariables.set('category_id', pm.response.json().data.id);
      }
    language: text/javascript
order: 4000
