$kind: http-request
description: Uploads a receipt image/PDF. Returns 202 immediately with scan_id and status=processing. AI processing runs asynchronously. Poll Get Scan Result until status is 'completed' or 'failed'.
url: "{{base_url}}/scans/upload"
method: POST
body:
  type: formdata
  content:
    - type: file
      key: receipt
      src: ""
      description: JPG, PNG or PDF, max 5MB
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 202) {
        pm.collectionVariables.set('scan_id', pm.response.json().data.scan_id);
      }
    language: text/javascript
order: 1000
